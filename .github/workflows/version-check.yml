name: Version Check

on:
  pull_request:
    paths:
      - 'lib/preline/version.rb'

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check version bump
      run: |
        echo "Checking if version was properly bumped..."
        git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- lib/preline/version.rb
        
    - name: Verify CHANGELOG
      run: |
        if ! git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -q "CHANGELOG.md"; then
          echo "::warning::Version bumped but CHANGELOG.md not updated"
        fi